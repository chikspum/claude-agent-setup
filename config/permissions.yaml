# permissions.yaml
# Human-readable reference for .claude/settings.json
# Edit settings.json to change actual permissions — this file is documentation only.
#
# PHILOSOPHY: Full access by default. Only deny what's dangerous or leaks secrets.
# This mirrors how experienced developers work — unrestricted tools, disciplined habits.

# ─────────────────────────────────────────
# ALLOW (full access)
# ─────────────────────────────────────────
allow:
  - Bash           # all shell commands (filtered by deny list)
  - Read           # read any file (filtered by deny list)
  - Write          # create/overwrite files
  - Edit           # patch files
  - Glob           # file search
  - Grep           # content search
  - WebFetch       # fetch URLs
  - WebSearch      # search the web
  - Agent          # spawn sub-agents
  - NotebookEdit   # edit Jupyter notebooks

# ─────────────────────────────────────────
# DENY — Secrets (highest priority)
# ─────────────────────────────────────────
deny_secrets:
  read_env_files:
    - "Read(.env)"            # real env files
    - "Read(.env.*)"          # .env.local, .env.production, etc.
    - "Read(**/.env)"
    - "Read(**/.env.*)"
    # EXCEPTION: .env.example and .env.sample are ALLOWED

  read_credentials:
    - "Read(*credentials*)"
    - "Read(*.pem)"
    - "Read(**/*.pem)"
    - "Read(**/id_rsa*)"
    - "Read(**/.ssh/*)"

  cat_env_files:
    - "Bash(cat .env*)"
    - "Bash(cat */.env*)"
    - "Bash(cat *credentials*)"
    - "Bash(cat *secret*)"
    - "Bash(cat *token*)"
    - "Bash(head .env*)"
    - "Bash(tail .env*)"
    - "Bash(less .env*)"
    - "Bash(more .env*)"

  print_env_vars:
    - "Bash(echo $*TOKEN*)"
    - "Bash(echo $*SECRET*)"
    - "Bash(echo $*KEY*)"
    - "Bash(echo $*PASSWORD*)"
    - "Bash(printenv *TOKEN*)"
    - "Bash(printenv *SECRET*)"
    - "Bash(env | grep -i *token*)"
    - "Bash(env | grep -i *secret*)"

# ─────────────────────────────────────────
# DENY — Destructive operations
# ─────────────────────────────────────────
deny_destructive:
  filesystem:
    - "Bash(rm -rf /)"
    - "Bash(rm -rf ~)"
    - "Bash(rm -rf /*)"
    - "Bash(dd:*)"
    - "Bash(mkfs:*)"
    - "Bash(chmod 777:*)"

  privilege:
    - "Bash(sudo:*)"

  remote_exec:
    - "Bash(curl * | bash:*)"
    - "Bash(curl * | sh:*)"
    - "Bash(wget * | bash:*)"
    - "Bash(wget * | sh:*)"

  git_dangerous:
    - "Bash(git push --force:*)"
    - "Bash(git push -f:*)"
    - "Bash(git reset --hard:*)"

# ─────────────────────────────────────────
# HOOKS (runtime protection)
# ─────────────────────────────────────────
hooks:
  pre_write:
    description: "Block Write/Edit to .env, credentials, .pem, id_rsa"
    exception: ".env.example and .env.sample are allowed"

  post_bash:
    description: "Scan Bash output for leaked tokens (ghp_, sk-, AKIA, private keys)"
    action: "Block output and warn user"
